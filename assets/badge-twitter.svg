<svg xmlns="http://www.w3.org/2000/svg" width="180" height="44">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="176" height="40" rx="20" ry="20" fill="none" stroke="#ffffff" stroke-width="1.5" filter="url(#glow)" opacity="0.2"/>
  <rect x="2" y="2" width="176" height="40" rx="20" ry="20" fill="#0d1117" stroke="url(#borderGrad)" stroke-width="1.2"/>
  <!-- X icon -->
  <text x="14" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#ffffff">𝕏</text>
  <text x="44" y="27" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" letter-spacing="0.5">X / Twitter</text>
</svg>
