<svg xmlns="http://www.w3.org/2000/svg" width="170" height="44">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a66c2;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0a66c2;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="166" height="40" rx="20" ry="20" fill="none" stroke="#0a66c2" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <rect x="2" y="2" width="166" height="40" rx="20" ry="20" fill="#0d1117" stroke="url(#borderGrad)" stroke-width="1.4"/>
  <image href="data:image/svg+xml;base64," x="12" y="10" width="22" height="22"/>
  <text x="44" y="27" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" letter-spacing="0.5">LinkedIn</text>
</svg>
